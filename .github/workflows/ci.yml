name: CI

# Runs the full quality gate on every push and pull request.
# Branch protection (configured in repo settings) requires this to pass
# before any PR can merge to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        # Test on minimum supported Node (18) and current LTS (20).
        # When 22 becomes LTS, add it; when 18 reaches EOL, drop it.
        node: ["18", "20"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: |
          rm -rf dist
          npm run build
          npm pack --dry-run --json > /tmp/pack.json
          node -e "
            const data = JSON.parse(require('fs').readFileSync('/tmp/pack.json'));
            const files = data[0].files.map(f => f.path);
            const forbidden = files.filter(f =>
              f.includes('.test.') ||
              f.startsWith('tsconfig') ||
              f === '.npmignore'
            );
            if (forbidden.length) {
              console.error('Forbidden files in tarball:', forbidden);
              process.exit(1);
            }
            console.log('Tarball contents OK:', files.length, 'files');
          "
